name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @hisab/db exec prisma generate

      - name: Typecheck (api)
        run: pnpm --filter @hisab/api exec tsc --noEmit

      - name: Typecheck (web)
        run: pnpm --filter @hisab/web exec tsc --noEmit

      - name: Lint
        run: pnpm lint
